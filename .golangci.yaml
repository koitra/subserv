version: "2"
linters:
  default: standard
  enable:
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
formatters:
  enable:
    - golines
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(src.rhoti.com/koitra/subserv)
        - blank
        - dot
        - alias
        - localmodule
    gofumpt:
      module-path: "src.rhoti.com/koitra/subserv"
