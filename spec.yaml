openapi: 3.1.0
info:
    title: Subserv
    version: 0.1.0
paths:
    /subscriptions:
        get:
            summary: Get subscriptions
            operationId: get-subscriptions
            parameters:
                - name: ids
                  in: query
                  explode: false
                  schema:
                    type: array
                    items:
                        type: string
                        format: uuid
                - name: user_ids
                  in: query
                  explode: false
                  schema:
                    type: array
                    items:
                        type: string
                        format: uuid
                - name: server_names
                  in: query
                  explode: false
                  schema:
                    type: array
                    items:
                        type: string
                - name: cursor
                  in: query
                  explode: false
                  schema:
                    type: string
                    format: date-time
                - name: limit
                  in: query
                  explode: false
                  schema:
                    type: integer
                    format: int64
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SubscriptionsIndexOutBody'
                "422":
                    description: Unprocessable Entity
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                "500":
                    description: Internal Server Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
        post:
            summary: Post subscriptions
            operationId: post-subscriptions
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SubscriptionsCreateInBody'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SubscriptionsCreateOutBody'
                "422":
                    description: Unprocessable Entity
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                "500":
                    description: Internal Server Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /subscriptions/{subscription_id}:
        put:
            summary: Put subscriptions by subscription ID
            operationId: put-subscriptions-by-subscription-id
            parameters:
                - name: subscription_id
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SubscriptionsUpdateInBody'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SubscriptionsUpdateOutBody'
                "422":
                    description: Unprocessable Entity
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                "500":
                    description: Internal Server Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
        delete:
            summary: Delete subscriptions by subscription ID
            operationId: delete-subscriptions-by-subscription-id
            parameters:
                - name: subscription_id
                  in: path
                  required: true
                  schema:
                    type: string
                    format: uuid
            responses:
                "204":
                    description: No Content
                "422":
                    description: Unprocessable Entity
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                "500":
                    description: Internal Server Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
    /subscriptions/total:
        get:
            summary: Get subscriptions total
            operationId: get-subscriptions-total
            parameters:
                - name: user_id
                  in: query
                  explode: false
                  schema:
                    type: string
                    format: uuid
                - name: service_name
                  in: query
                  explode: false
                  schema:
                    type: string
                    minLength: 1
                - name: period_start
                  in: query
                  description: Month and year (MM-YYYY)
                  required: true
                  explode: false
                  schema:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                - name: period_end
                  in: query
                  description: Month and year (MM-YYYY)
                  required: true
                  explode: false
                  schema:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SubscriptionsTotalOutBody'
                "422":
                    description: Unprocessable Entity
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                "500":
                    description: Internal Server Error
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
components:
    schemas:
        APISubscription:
            type: object
            additionalProperties: false
            properties:
                end_date:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                price:
                    type: integer
                    format: int32
                service_name:
                    type: string
                start_date:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                subscription_id:
                    type: string
                user_id:
                    type: string
            required:
                - subscription_id
                - service_name
                - price
                - user_id
                - start_date
        ErrorDetail:
            type: object
            additionalProperties: false
            properties:
                location:
                    type: string
                    description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
                message:
                    type: string
                    description: Error message text
                value:
                    description: The value at the given location
        ErrorModel:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/ErrorModel.json
                    readOnly: true
                detail:
                    type: string
                    description: A human-readable explanation specific to this occurrence of the problem.
                    examples:
                        - Property foo is required but is missing.
                errors:
                    type: array
                    description: Optional list of individual error details
                    items:
                        $ref: '#/components/schemas/ErrorDetail'
                instance:
                    type: string
                    description: A URI reference that identifies the specific occurrence of the problem.
                    format: uri
                    examples:
                        - https://example.com/error-log/abc123
                status:
                    type: integer
                    description: HTTP status code
                    format: int64
                    examples:
                        - 400
                title:
                    type: string
                    description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
                    examples:
                        - Bad Request
                type:
                    type: string
                    description: A URI reference to human-readable documentation for the error.
                    format: uri
                    default: about:blank
                    examples:
                        - https://example.com/errors/example
        SubscriptionsCreateInBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/SubscriptionsCreateInBody.json
                    readOnly: true
                end_date:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                price:
                    type: integer
                    format: int32
                    minimum: 0
                service_name:
                    type: string
                    minLength: 1
                start_date:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                user_id:
                    type: string
                    format: uuid
            required:
                - service_name
                - price
                - user_id
                - start_date
        SubscriptionsCreateOutBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/SubscriptionsCreateOutBody.json
                    readOnly: true
                subscription:
                    $ref: '#/components/schemas/APISubscription'
            required:
                - subscription
        SubscriptionsIndexOutBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/SubscriptionsIndexOutBody.json
                    readOnly: true
                cursor:
                    type: string
                    format: date-time
                subscriptions:
                    type: array
                    items:
                        $ref: '#/components/schemas/APISubscription'
            required:
                - subscriptions
        SubscriptionsTotalOutBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/SubscriptionsTotalOutBody.json
                    readOnly: true
                total:
                    type: integer
                    format: int64
            required:
                - total
        SubscriptionsUpdateInBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/SubscriptionsUpdateInBody.json
                    readOnly: true
                end_date:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                price:
                    type: integer
                    format: int32
                    minimum: 0
                service_name:
                    type: string
                start_date:
                    type: string
                    description: Month and year (MM-YYYY)
                    format: month-year
                    examples:
                        - 02-2026
                user_id:
                    type: string
                    format: uuid
            required:
                - service_name
                - price
                - user_id
                - start_date
        SubscriptionsUpdateOutBody:
            type: object
            additionalProperties: false
            properties:
                $schema:
                    type: string
                    description: A URL to the JSON Schema for this object.
                    format: uri
                    examples:
                        - https://example.com/schemas/SubscriptionsUpdateOutBody.json
                    readOnly: true
                subscription:
                    $ref: '#/components/schemas/APISubscription'
            required:
                - subscription
